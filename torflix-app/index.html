<!DOCTYPE html>
<html lang="fr">
<head>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="background-color" content="#0a0a0a" />
  
  
  
  
  
  
  
  <title>TorFlix</title>
  <style>
    html, body, #root { margin:0; padding:0; height:100%; background:#0a0a0a; }
    #splash { position:fixed; inset:0; background:#0a0a0a; display:flex; align-items:center; justify-content:center; z-index:9999; }
    #splash span { color:#e50914; font-size:2rem; font-weight:900; font-family:system-ui; }
  </style>

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TorFlix" />
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />
  <!-- Apple Splash Screens -->
  <meta name="apple-mobile-web-app-orientations" content="portrait" />
  <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-TileColor" content="#0a0a0a" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

</head>
<body>
  <div id="splash"><span>TorFlix</span></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
    }
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { const s = document.getElementById('splash'); if(s) s.style.display='none'; }, 500);
    });
  </script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
