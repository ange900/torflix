name: Deploy TorFlix

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploy Backend ==="
            cp -r /tmp/backend-deploy/* /root/backend/src/ 2>/dev/null || true
            docker cp /root/backend/src/. torflix-backend:/app/src/
            docker restart torflix-backend
            sleep 3
            docker logs torflix-backend --tail 5

            echo "=== Deploy Frontend ==="
            docker cp /root/frontend/app/. torflix-frontend:/app/app/
            docker cp /root/frontend/components/. torflix-frontend:/app/components/
            docker restart torflix-frontend
            sleep 3

            echo "=== Backup automatique ==="
            python3 /root/torflix.py backup

            echo "✅ Deploy terminé"
