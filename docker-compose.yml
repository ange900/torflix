version: '3.9'

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: torflix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: torflix
      POSTGRES_USER: ${DB_USER:-torflix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-torflix_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/models/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torflix"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: torflix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torflix-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-torflix}:${DB_PASSWORD:-torflix_secret_2026}@db:5432/torflix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_very_long_secret_key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_very_long}
      TMDB_API_KEY: ${TMDB_API_KEY:-your_tmdb_api_key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-32_chars_encryption_key_here_ok}
    ports:
      - "4000:4000"
    volumes:
      - torrent_cache:/tmp/torflix-cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: torflix-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: torflix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  torrent_cache:
